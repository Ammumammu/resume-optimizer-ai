<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resume Optimizer AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background-color: #0f172a;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .container {
            width: 90%;
            max-width: 600px;
            padding: 2rem;
            background-color: #1e293b;
            border-radius: 1rem;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            text-align: center;
        }
        h1, h2, p {
            margin: 0.5rem 0;
        }
        input, textarea, button {
            width: calc(100% - 2rem);
            padding: 1rem;
            margin: 1rem 0;
            border: none;
            border-radius: 0.5rem;
            background-color: #ffffff;
            color: #0f172a;
            font-size: 1rem;
        }
        button {
            background-color: #6366f1;
            color: #ffffff;
            cursor: pointer;
        }
        button:hover {
            background-color: #4f46e5;
        }
        .right {
            text-align: right;
        }
        .cross-sell {
            margin-top: 2rem;
        }
        .cross-sell h3 {
            margin-bottom: 1rem;
        }
        .cross-sell-item {
            background-color: #111827;
            border-radius: 0.5rem;
            padding: 1rem;
            margin: 0.5rem 0;
        }
        @media (max-width: 600px) {
            .container {
                width: 100%;
                padding: 1rem;
            }
        }
    </style>
</head>
<body>
    <div id="root"></div>
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
    <script src="https://cdn.posthog.com/posthog-js.min.js"></script>
    <script type="text/babel">
        const CONFIG = {
            GROQ_KEY: 'CONFIG.GROQ_KEY'
        };

        const posthog = new PostHog('phc_euWjg9sVjJX1x1x1x1x1x1x1x1x1x1x1x1x1', {
            api_host: 'https://app.posthog.com',
        });

        const LandingPage = ({ onUseTool }) => (
            <div className="container">
                <h1>Rejected Resumes</h1>
                <h2>Job seekers get rewritten resumes in 15 seconds</h2>
                <p>Paste resume → AI analyzes in 10 sec → Instant rewrite</p>
                <button onClick={onUseTool}>Optimize Now</button>
            </div>
        );

        const ToolPage = ({ onBack, onUseTool }) => {
            const [resume, setResume] = React.useState('');
            const [optimizedResume, setOptimizedResume] = React.useState('');
            const [loading, setLoading] = React.useState(false);
            const [freeLimitHit, setFreeLimitHit] = React.useState(false);

            const optimizeResume = async () => {
                posthog.capture('tool_used');
                setLoading(true);
                try {
                    const response = await fetch('https://api.groq.com/v1/predict', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${CONFIG.GROQ_KEY}`
                        },
                        body: JSON.stringify({
                            model: 'llama-3.3-70b-versatile',
                            prompt: `Optimize the following resume for ATS systems and job interviews: ${resume}\n\nOutput as a bullet-by-bullet rewrite with strong action verbs, relevant keywords, and correct formatting. Include "Generated by Resume Optimizer AI — resume-optimizer-ai.vercel.app" at the end of each bullet point.`,
                            max_tokens: 1000
                        })
                    });
                    const data = await response.json();
                    setOptimizedResume(data.choices[0].text);
                } catch (error) {
                    console.error('Error optimizing resume:', error);
                } finally {
                    setLoading(false);
                    setFreeLimitHit(true); // Simulate free limit hit
                }
            };

            React.useEffect(() => {
                if (freeLimitHit) {
                    posthog.capture('free_limit_hit');
                }
            }, [freeLimitHit]);

            return (
                <div className="container">
                    <h2>Optimize Your Resume</h2>
                    <textarea value={resume} onChange={(e) => setResume(e.target.value)} placeholder="Paste your resume here..." />
                    <button onClick={optimizeResume} disabled={loading}>
                        {loading ? 'Optimizing...' : 'Optimize Now'}
                    </button>
                    {optimizedResume && (
                        <div>
                            <h3>Optimized Resume</h3>
                            <textarea readOnly value={optimizedResume} />
                        </div>
                    )}
                    <button onClick={onBack}>Back</button>
                </div>
            );
        };

        const PaywallPage = ({ onBack }) => {
            const [email, setEmail] = React.useState('');
            const [submitted, setSubmitted] = React.useState(false);
            const [tools, setTools] = React.useState([]);

            React.useEffect(() => {
                posthog.capture('paywall_shown');
                fetch('https://raw.githubusercontent.com/Ammumammu/agent-os/main/public/portfolio.json')
                    .then(response => response.json())
                    .then(data => setTools(data.slice(0, 3)))
                    .catch(error => console.error('Error fetching tools:', error));
            }, []);

            const submitEmail = () => {
                posthog.capture('email_captured');
                setSubmitted(true);
                // Simulate email submission
                setTimeout(() => {
                    alert('Thank you for signing up! You now have 3 free uses.');
                }, 500);
            };

            const priceTestAB = posthog.getFeatureFlag('price-test-ab') === 'test';
            const price = priceTestAB ? '$23/mo' : '$15/mo';

            return (
                <div className="container">
                    <h2>Unlock More Optimizations</h2>
                    <p>Get unlimited access to Resume Optimizer AI for {price}</p>
                    <button onClick={() => window.location.href = 'https://buy.stripe.com/test_8x26oAbHI34i5HMbATg7e0j'}>Subscribe Now</button>
                    <button onClick={() => window.location.href = 'https://buy.stripe.com/test_8x26oAbHI34i5HMbATg7e0j'}>Buy Now</button>
                    {!submitted && (
                        <div>
                            <p>Or try 3 more free optimizations:</p>
                            <input type="email" value={email} onChange={(e) => setEmail(e.target.value)} placeholder="Enter your email" />
                            <button onClick={submitEmail}>Get Free Uses</button>
                        </div>
                    )}
                    <div className="cross-sell">
                        <h3>Related Tools</h3>
                        {tools.map((tool, index) => (
                            <div key={index} className="cross-sell-item">
                                <h4>{tool.name}</h4>
                                <p>{tool.description}</p>
                            </div>
                        ))}
                    </div>
                    <button onClick={onBack}>Back</button>
                </div>
            );
        };

        const App = () => {
            const [page, setPage] = React.useState('landing');

            React.useEffect(() => {
                posthog.identify('unique_user_id');
                posthog.capture('tool_opened');
            }, []);

            const renderPage = () => {
                switch (page) {
                    case 'tool':
                        return <ToolPage onBack={() => setPage('landing')} onUseTool={() => setPage('paywall')} />;
                    case 'paywall':
                        return <PaywallPage onBack={() => setPage('tool')} />;
                    default:
                        return <LandingPage onUseTool={() => setPage('tool')} />;
                }
            };

            return (
                <div>
                    {renderPage()}
                </div>
            );
        };

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
